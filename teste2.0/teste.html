<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componente-input</title>
    <link rel="stylesheet" href="style-teste.css"/>
    
</head>
<body>
   <section class="section">

    <picture class="bg-image">
        <!-- Desktop -->
        <source media="(min-width: 769px)" srcset="/image/background_desktop.webp">
        <!-- Mobile -->
        <img src="/image/img-mobile.webp" alt="Background">
    </picture>

    <div class="content">
        <div class="overlay">
            <h1 id="texto">
                Uma conta digital completa para a sua vida render mais
            </h1>
        </div>

        <div class="card">
            <input type="text" id="inputTexto" placeholder="Digite seu texto aqui">
            <button id="btnTrocar">Trocar texto</button>
        </div>
    </div>

</section>

    <script src="scrips.js"></script>

</body>
</html>
